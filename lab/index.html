function resizeLastNode(node,margin)
{
	var windowHeight;

	if (typeof window.innerWidth != 'undefined')
		windowHeight = window.innerHeight;
	else if (typeof document.documentElement != 'undefined'
			&& typeof document.documentElement.clientWidth != 'undefined'
			&& document.documentElement.clientWidth != 0) // IE6 in standards compliant mode (i.e. with a valid doctype as the first line in the document)
		windowHeight = document.documentElement.clientHeight;
	else // older versions of IE
		windowHeight = document.getElementsByTagName('body')[0].clientHeight;

	node.style.height = (windowHeight - node.offsetTop  - (margin||0))+ "px";
}

function writeConsole(text)
{
 $('console').innerHTML += '<tt>' + text + '</tt><br>'
 resizeLastNode($('divConsole'),45)
}

function rexec(command,handler,quiet)
{
//debug mode
 if ($('debugmode').checked)
 {
 	var p = command.split(' ');
	 p.shift();
	 switch (p.shift())
	 {
	 	case 'move': handler(p.join(' ')); break;
	 	case 'pivot': state.pivot=p.map(Number);
	 }
	 
	 return;
 }

 if (!quiet) writeConsole('<b>&gt;</b>' + command)
 loadXMLDoc('/exec?' + command, function(x) {if (x &&!quiet) writeConsole(x);handler(x)})
}

<script type="text/javascript">
//coordinate system
var cs = {origin: [0,0,0], x:[1,0,0], y:[0,1,0], z:[0,0,1]};
cs.angle = Matrix.rotation([0,0,1],Math.PI/6);
cs.transform = cs.angle.times(Matrix.rotation([0,1,0],Math.PI)); //rotation of reference w.r.t. hexapod
//reference frame
var rf = {origin: cs.angle.times([0,31.1608,434.6859]), //in the hexapod frame
		  x: cs.transform.times(cs.x),
		  y: cs.transform.times(cs.y),
		  z: cs.transform.times(cs.z),
		  transform: cs.transform.inverse()};

var canvas = document.getElementById('display');
var ctx = canvas.getContext('2d');
var scale = .2;
screenInfo = ({vertex:[-15, -5, 5], normal:[0, 0, 0], u:[], v:vnorm([0,0,1]), orientation:[1, -1], velocity: 8});
ctx.save();
var mouse = {maxScale:1000, down: false, x:0, y:0, vertex: screenInfo.vertex};

resetCanvas();
function resetCanvas()
{
	//canvas.width = canvas.parentNode.clientWidth;
	//	canvas.height = window.innerHeight;
	cw = canvas.width/2;
	ch = canvas.height/2;
	ctx.restore();
	ctx.save();
	ctx.translate(cw+.5,ch*3/2+.5);
	ctx.scale(1,-1);
	ctx.clearRect ( -cw*2 , -ch*2 , cw*4 , ch*4 );
}

function setViewpoint(vertex)
{
	screenInfo.vertex = vscale(vnorm(vertex),10)
	screenInfo.normal = vnorm(vsub(cs.origin,screenInfo.vertex));
	screenInfo.u = vnorm(vcross(screenInfo.normal,screenInfo.v));
	screenInfo.v = vnorm(vcross(screenInfo.u,screenInfo.normal));
}

setViewpoint(screenInfo.vertex);

function rgb(R,G,B) {return 'rgb('+R+','+G+','+B+')';}
function rgba(R,G,B,A) {return 'rgba('+R+','+G+','+B+','+(A||'.8')+')'}
function line(a,b,stroke,fill)
{
	ctx.beginPath();
	if (fill) 	ctx.fillStyle = fill;
	if (stroke) ctx.strokeStyle = stroke;
	if (a.length > 2) a=pointToLocal(screenInfo,a);
	if (b.length > 2) b=pointToLocal(screenInfo,b);
	ctx.moveTo(scale*a[0],scale*a[1]);
	ctx.lineTo(scale*b[0],scale*b[1]);
	ctx.stroke();
}
function line(a,b,stroke,dash)
{
	ctx.beginPath();
	if (dash) 	ctx.setLineDash(dash);
	if (stroke) ctx.strokeStyle = stroke;
	if (a.length > 2) a=pointToLocal(screenInfo,a);
	if (b.length > 2) b=pointToLocal(screenInfo,b);
	ctx.moveTo(scale*a[0],scale*a[1]);
	ctx.lineTo(scale*b[0],scale*b[1]);
	ctx.stroke();
}

function polyline(points,stroke,close,dash) // [ [pt1, pt2, ...],[]]
{
	ctx.beginPath();
	if (dash) 	ctx.setLineDash(dash);
	if (stroke) ctx.strokeStyle = stroke;
	var a = pointToLocal(screenInfo,points[0]);
	ctx.moveTo(scale*a[0],scale*a[1]);
	for (var i=1;i<points.length;i++)
	{
		a = pointToLocal(screenInfo,points[i]);
		ctx.lineTo(scale*a[0],scale*a[1]);
	}
	if (close) ctx.closePath();
	ctx.stroke();
}

objects = {hexapod: [], cargo:[]};

function generateGeometry()
{
	var p2 = 2.0*Math.PI;
	var N = 36;
	var t = []; var z = 0; var r = 500; 
	for (var i=0; i<N; i++) {t.push([r*Math.cos(p2*i/N),r*Math.sin(p2*i/N),z]);}
	objects.hexapod.push(t);
	t=[];z=0; r = 450;
	for (var i=0; i<N; i++) {t.push([r*Math.cos(p2*i/N),r*Math.sin(p2*i/N),z]);}
	objects.hexapod.push(t);
//	t=[];z=-100; r = 450;
//	for (var i=0; i<N; i++) {t.push([r*Math.cos(p2*i/N),r*Math.sin(p2*i/N),z]);}
//	objects.hexapod.push(t);
//	t=[];z=-100; r = 500;
//	for (var i=0; i<N; i++) {t.push([r*Math.cos(p2*i/N),r*Math.sin(p2*i/N),z]);}
//	objects.hexapod.push(t);

	N=6; 
	t=[];z =0;
	for (var i=0; i<N; i++) {t.push(inCargoCoordinates(cs.transform,rf.origin,[r*Math.sin(p2*i/N), r*Math.cos(p2*i/N),z]));}
	objects.cargo.push(t);

//	t=[];z =100;
//	for (var i=0; i<N; i++) {t.push(inCoordinateSystem(cs.transform,rf.origin,[r*Math.cos(p2*i/N), r*Math.sin(p2*i/N),z]));}
	objects.cargo.push(t);

}
generateGeometry();

function previewToHexapod()
{
	// a translation is one thing, but how do we decompose the rotation into different axes?
	// first transform the rotation into the hexapod coordinate system
	// then extract the u, v, w Euler angles
	//first we move the hexapod w.r.t. the preview pivot point
	var p = state.preview.slice(0,3);
	p = rf.transform.times(p);
	//var M = eulerToRotation(cs,state.preview.slice(3));
	//var a = rf.transform.times(M);
	//a = rotationToEuler(a);
	var R = eulerToRotation(rf,state.preview.slice(3));
	b = rotationToEuler(R);
	//how much does the rf origin move?
	var dp = R.times(rf.origin);
	p = vadd(p,vsub(rf.origin,dp));
	return p.concat(b);
}

// https://en.wikipedia.org/wiki/Rotation_formalisms_in_three_dimensions#Rotation_matrix_%E2%86%94_Euler_axis/angle
function rotationToEuler(M) //if not a multiple of pi, easy
{
	var sinv = - M.at(2,0);
	var v = Math.asin(sinv);
	var cosv = Math.cos(v);
	var sinu = M.at(2,1)/cosv;
	var u = Math.asin(sinu);
	var sinw = M.at(1,0)/cosv;
	var w = Math.asin(sinw);
	return vscale([u,v,w],180/Math.PI);
}
function eulerToRotation(cs,uvw)
{
	var u = Matrix.rotation(cs.x,Math.PI*uvw[0]/180.0);
	var v = Matrix.rotation(cs.y,Math.PI*uvw[1]/180.0);
	var w = Matrix.rotation(cs.z,Math.PI*uvw[2]/180.0);
	return w.times(v).times(u);
}

function applyMotion(hex,points)
{
	var p = [];
	var M = eulerToRotation(cs,hex.slice(3));
	for (var i=0; i<points.length; i++)
	{
		var x = M.times(vadd(points[i],hex));	
		p[i] = x;	
	}
	return p;
}

function applyHexapodMotion(points)
{
	var hex = state.hexapod;
	var p = [];
	var u = Matrix.rotation(cs.x,Math.PI*hex[3]/180.0);
	var v = Matrix.rotation(cs.y,Math.PI*hex[4]/180.0);
	var w = Matrix.rotation(cs.z,Math.PI*hex[5]/180.0);
	var uvw = u.times(v).times(w);
	for (var i=0; i<points.length; i++)
	{
		var x = uvw.times(vadd(points[i],hex));	
		p[i] = x;	
	}
	return p;
}

function inCargoCoordinates(rotation, origin, point)
{
	return vadd(rotation.times(point),origin);
}

function redraw()
{
	resetCanvas();
	var L = 350;
	//baseline position
	line(cs.origin,vscale(cs.x,L),'red');
	line(cs.origin,vscale(cs.y,L),'green');
	line(cs.origin,vscale(cs.z,L),'blue');
	for (var x in objects) 
		for (var i in objects[x])
			polyline(objects[x][i],rgba(50,50,50,.8),true);

	$('pivot').innerHTML = '<pre>'+ (new Matrix(1,3,rf.origin).toString(3))+'</pre>';
	$('transform').innerHTML = '<pre>'+cs.transform.toString(3)+'</pre>';

	//current position
	line(rf.origin,vadd(rf.origin,vscale(rf.x,L)),'red',[5,5]);
	line(rf.origin,vadd(rf.origin,vscale(rf.y,L)),'green');
	line(rf.origin,vadd(rf.origin,vscale(rf.z,L)),'blue');

	for (var x in objects) 
		for (var i in objects[x])
			polyline(applyMotion(state.hexapod,objects[x][i]),'black',true,[5,5]);

	//preview position
	var hex = previewToHexapod();

	for (var x in objects) 
		for (var i in objects[x])
			polyline(applyMotion(hex,objects[x][i]),'red',true,[3,3]);


	//how does the virtual reference frame move?
	polyline(applyMotion(hex,[rf.origin,vadd(rf.origin,vscale(rf.x,L))]),'red',false,[3,3]);
	polyline(applyMotion(hex,[rf.origin,vadd(rf.origin,vscale(rf.y,L))]),'green',false,[3,3]);
	polyline(applyMotion(hex,[rf.origin,vadd(rf.origin,vscale(rf.z,L))]),'blue',false,[3,3]);
}	

redraw();

window.addEventListener('resize', redraw, false);

</script>
<script>

Number.prototype.toFloat = function(prec)
{
   var s = this.toFixed(prec)
   while (s.length > 1 && (s[s.length-1] == '0' || s[s.length-1] == '.'))
   {
    s = s.substr(0,s.length-1)
    if (s[s.length-1] == '.') break
   }
   return s
}

function scaleButtons(name,scale,max,min)
{
 var b = document.getElementsByName(name);
 for (var i=0; i<b.length; i++)
 {
  var y = Number(b[i].innerHTML) * scale
  if (Math.abs(y) > max || Math.abs(y) < min)
    continue
  var s = (Number(b[i].innerHTML) * scale).toFloat(9)
  b[i].innerHTML = s > 0 ? ('+' + s) : '' + s
 }
}


function notePrint(x)
{
 $('noteLog').innerHTML = x.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/gm,'\n<br>').replace(/(\d\d)(\d\d)(\d\d):/g,"<b>$1:$2:$3</b>")
}

function hexapodDone(x)
{

function hexapodReply(x)
{
 if (x)
 {
    $('hresult').innerHTML = x
	if (x.indexOf("Error") != -1) return

    var n = x.split(/\s+/g)
	for (var i=0; i<6; i++) state.hexapod[i] = Number(n[i])
	$('hstatus').innerHTML= n.length > 5 ? n[6] : "Ready";
	$('hex0').innerHTML=state.hexapod[0].toFloat(9);
	$('hex1').innerHTML=state.hexapod[1].toFloat(9);
	$('hex2').innerHTML=state.hexapod[2].toFloat(9);
	$('hex3').innerHTML=state.hexapod[3].toFloat(9);
	$('hex4').innerHTML=state.hexapod[4].toFloat(9);
	$('hex5').innerHTML=state.hexapod[5].toFloat(9);

	$('pivot').innerHTML=state.pivot.join(' ');
	redraw();
 }
 else
   rexec('hexapod.js move',hexapodReply)
}

var startupQueue = [
function() {rexec('hexapod.js move',hexapodReply) },
function() {rexec('note.js',notePrint) },

]

function startup()
{
 for (var i=0; i<startupQueue; i++)
  startupQueue[i]()
}

	$('pre4').innerHTML=state.preview[4].toFloat(9);

 redraw();

{
 if (obj) state.hexapod[index] += Number(obj.innerHTML)

 $('hstatus').innerHTML="Moving"
 //var msg = '/exec?hexapod.js move'
var msg = 'hexapod.js move'

 //loadXMLDoc(msg,hexapodReply)

function cgh(index,obj)
{
 if (obj)
